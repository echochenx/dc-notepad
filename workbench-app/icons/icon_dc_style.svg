<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- DC 品牌色渐变 -->
    <linearGradient id="dcBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF8F5C"/>
    </linearGradient>
    <!-- 记事本渐变 -->
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F8F9FA"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- DC 风格背景：圆角矩形 -->
  <rect x="20" y="20" width="200" height="200" rx="52" fill="url(#dcBgGrad)" filter="url(#softShadow)"/>
  
  <!-- 记事本主体：白色纸张 -->
  <rect x="60" y="55" width="120" height="140" rx="12" fill="url(#noteGrad)"/>
  
  <!-- 记事本顶部装订孔 -->
  <circle cx="80" cy="72" r="4" fill="#E5E7EB"/>
  <circle cx="100" cy="72" r="4" fill="#E5E7EB"/>
  <circle cx="120" cy="72" r="4" fill="#E5E7EB"/>
  <circle cx="140" cy="72" r="4" fill="#E5E7EB"/>
  <circle cx="160" cy="72" r="4" fill="#E5E7EB"/>
  
  <!-- 文本行（模拟笔记内容）-->
  <rect x="75" y="95" width="70" height="5" rx="2.5" fill="#6B7280"/>
  <rect x="75" y="110" width="90" height="5" rx="2.5" fill="#9CA3AF"/>
  <rect x="75" y="125" width="80" height="5" rx="2.5" fill="#9CA3AF"/>
  <rect x="75" y="140" width="60" height="5" rx="2.5" fill="#9CA3AF"/>
  
  <!-- 待办勾选框（体现"待办"功能）-->
  <rect x="75" y="160" width="18" height="18" rx="4" fill="#FF6B35" opacity="0.15"/>
  <path d="M79 169 L84 174 L91 165" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- 悬浮小圆点装饰（呼应 DC 风格）-->
  <circle cx="165" cy="70" r="8" fill="white" opacity="0.3"/>
  <circle cx="175" cy="85" r="5" fill="white" opacity="0.2"/>
</svg>
