<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="20" y="20" width="200" height="200" rx="48" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 记事本主体 -->
  <rect x="55" y="55" width="130" height="150" rx="12" fill="white" opacity="0.95"/>
  
  <!-- 记事本顶部装订线 -->
  <rect x="55" y="75" width="130" height="8" rx="4" fill="#E5E7EB"/>
  
  <!-- 便签角标（悬浮隐喻）-->
  <path d="M155 45 L195 45 L195 85 L175 85 L155 105 Z" fill="url(#accentGrad)" opacity="0.9"/>
  
  <!-- 文本行 -->
  <rect x="75" y="100" width="90" height="6" rx="3" fill="#9CA3AF"/>
  <rect x="75" y="118" width="70" height="6" rx="3" fill="#9CA3AF"/>
  <rect x="75" y="136" width="80" height="6" rx="3" fill="#9CA3AF"/>
  <rect x="75" y="154" width="60" height="6" rx="3" fill="#9CA3AF"/>
  
  <!-- 勾选标记 -->
  <circle cx="80" cy="180" r="12" fill="#10B981" opacity="0.2"/>
  <path d="M74 180 L78 184 L86 176" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>