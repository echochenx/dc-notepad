<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DC 悬浮记事本 - 图标对比</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      margin: 0;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { text-align: center; color: #333; margin-bottom: 40px; }
    .comparison {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      flex: 1;
      min-width: 280px;
      max-width: 400px;
    }
    .card h2 {
      color: #666;
      font-size: 18px;
      margin-bottom: 20px;
    }
    .icon-display {
      width: 200px;
      height: 200px;
      margin: 0 auto 20px;
      border-radius: 20px;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-display svg {
      width: 180px;
      height: 180px;
    }
    .features {
      text-align: left;
      font-size: 14px;
      color: #666;
      line-height: 1.8;
    }
    .features li { margin: 8px 0; }
    .highlight { color: #FF6B35; font-weight: 600; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #FF6B35;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
    }
    .divider {
      text-align: center;
      margin: 40px 0;
      color: #999;
    }
    .all-sizes {
      display: flex;
      gap: 30px;
      justify-content: center;
      align-items: flex-end;
      margin-top: 30px;
    }
    .size-item { text-align: center; }
    .size-item .label { font-size: 12px; color: #999; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 DC 悬浮记事本 - 图标设计对比</h1>
    
    <div class="comparison">
      <!-- 旧版 -->
      <div class="card">
        <h2>第一版设计</h2>
        <div class="icon-display">
          <svg width="180" height="180" viewBox="0 0 240 240">
            <defs>
              <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#10B981"/>
                <stop offset="100%" style="stop-color:#059669"/>
              </linearGradient>
              <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#F97316"/>
                <stop offset="100%" style="stop-color:#EA580C"/>
              </linearGradient>
            </defs>
            <rect x="15" y="15" width="150" height="150" rx="36" fill="url(#bgGrad1)"/>
            <rect x="41" y="41" width="98" height="113" rx="9" fill="white" opacity="0.95"/>
            <rect x="41" y="56" width="98" height="6" rx="3" fill="#E5E7EB"/>
            <path d="M116 34 L146 34 L146 64 L131 64 L116 79 Z" fill="url(#accentGrad1)" opacity="0.9"/>
            <rect x="56" y="75" width="68" height="4.5" rx="2" fill="#9CA3AF"/>
            <rect x="56" y="88" width="53" height="4.5" rx="2" fill="#9CA3AF"/>
            <rect x="56" y="101" width="60" height="4.5" rx="2" fill="#9CA3AF"/>
            <circle cx="60" cy="135" r="9" fill="#10B981" opacity="0.2"/>
            <path d="M56 135 L59 138 L64 132" stroke="#059669" stroke-width="2" fill="none"/>
          </svg>
        </div>
        <ul class="features">
          <li>绿色系渐变背景</li>
          <li>绿色+橙色双色搭配</li>
          <li>悬浮便签角标设计</li>
          <li>风格偏工具类</li>
        </ul>
      </div>
      
      <!-- 新版 DC 风格 -->
      <div class="card">
        <h2><span class="highlight">★ 新版设计（DC风格）</span></h2>
        <div class="icon-display">
          <svg width="180" height="180" viewBox="0 0 240 240">
            <defs>
              <linearGradient id="dcBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#FF6B35"/>
                <stop offset="100%" style="stop-color:#FF8F5C"/>
              </linearGradient>
              <linearGradient id="noteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#FFFFFF"/>
                <stop offset="100%" style="stop-color:#F8F9FA"/>
              </linearGradient>
            </defs>
            <rect x="15" y="15" width="150" height="150" rx="39" fill="url(#dcBgGrad)"/>
            <rect x="45" y="41" width="90" height="105" rx="9" fill="url(#noteGrad)"/>
            <circle cx="60" cy="54" r="3" fill="#E5E7EB"/>
            <circle cx="75" cy="54" r="3" fill="#E5E7EB"/>
            <circle cx="90" cy="54" r="3" fill="#E5E7EB"/>
            <circle cx="105" cy="54" r="3" fill="#E5E7EB"/>
            <circle cx="120" cy="54" r="3" fill="#E5E7EB"/>
            <rect x="56" y="71" width="53" height="3.8" rx="1.9" fill="#6B7280"/>
            <rect x="56" y="82" width="68" height="3.8" rx="1.9" fill="#9CA3AF"/>
            <rect x="56" y="94" width="60" height="3.8" rx="1.9" fill="#9CA3AF"/>
            <rect x="56" y="105" width="45" height="3.8" rx="1.9" fill="#9CA3AF"/>
            <rect x="56" y="120" width="13.5" height="13.5" rx="3" fill="#FF6B35" opacity="0.15"/>
            <path d="M59 126.5 L63 130.5 L68.5 124" stroke="#FF6B35" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="123.75" cy="52.5" r="6" fill="white" opacity="0.3"/>
            <circle cx="131.25" cy="63.75" r="3.75" fill="white" opacity="0.2"/>
          </svg>
        </div>
        <ul class="features">
          <li><span class="highlight">DC 品牌暖橙色渐变</span></li>
          <li><span class="highlight">圆角矩形轮廓（呼应 DC）</span></li>
          <li><span class="highlight">记事本纸张主体</span></li>
          <li><span class="highlight">顶部装订孔设计</span></li>
          <li><span class="highlight">待办勾选框元素</span></li>
        </ul>
        <a href="#" class="btn" onclick="alert('新版设计 ✅');return false;">选择此设计</a>
      </div>
    </div>
    
    <div class="divider">— 新版图标多尺寸预览 —</div>
    
    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <div class="all-sizes">
        <div class="size-item">
          <svg width="64" height="64" viewBox="0 0 240 240">
            <rect x="20" y="20" width="200" height="200" rx="52" fill="url(#dcBgGrad)"/>
            <rect x="60" y="55" width="120" height="140" rx="12" fill="white"/>
            <circle cx="80" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="100" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="120" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="140" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="160" cy="72" r="4" fill="#E5E7EB"/>
            <rect x="75" y="95" width="70" height="5" rx="2.5" fill="#6B7280"/>
            <rect x="75" y="110" width="90" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="125" width="80" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="140" width="60" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="160" width="18" height="18" rx="4" fill="#FF6B35" opacity="0.15"/>
            <path d="M79 169 L84 174 L91 165" stroke="#FF6B35" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="label">64×64</div>
        </div>
        <div class="size-item">
          <svg width="128" height="128" viewBox="0 0 240 240">
            <rect x="20" y="20" width="200" height="200" rx="52" fill="url(#dcBgGrad)"/>
            <rect x="60" y="55" width="120" height="140" rx="12" fill="white"/>
            <circle cx="80" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="100" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="120" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="140" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="160" cy="72" r="4" fill="#E5E7EB"/>
            <rect x="75" y="95" width="70" height="5" rx="2.5" fill="#6B7280"/>
            <rect x="75" y="110" width="90" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="125" width="80" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="140" width="60" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="160" width="18" height="18" rx="4" fill="#FF6B35" opacity="0.15"/>
            <path d="M79 169 L84 174 L91 165" stroke="#FF6B35" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="label">128×128</div>
        </div>
        <div class="size-item">
          <svg width="200" height="200" viewBox="0 0 240 240">
            <rect x="20" y="20" width="200" height="200" rx="52" fill="url(#dcBgGrad)"/>
            <rect x="60" y="55" width="120" height="140" rx="12" fill="white"/>
            <circle cx="80" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="100" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="120" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="140" cy="72" r="4" fill="#E5E7EB"/>
            <circle cx="160" cy="72" r="4" fill="#E5E7EB"/>
            <rect x="75" y="95" width="70" height="5" rx="2.5" fill="#6B7280"/>
            <rect x="75" y="110" width="90" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="125" width="80" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="140" width="60" height="5" rx="2.5" fill="#9CA3AF"/>
            <rect x="75" y="160" width="18" height="18" rx="4" fill="#FF6B35" opacity="0.15"/>
            <path d="M79 169 L84 174 L91 165" stroke="#FF6B35" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="label">240×240 ⭐</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
