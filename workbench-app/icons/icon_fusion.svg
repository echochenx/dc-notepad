<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- DC 橙色渐变 -->
    <linearGradient id="dcOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF8F5C"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景：DC 圆角方形 -->
  <rect x="20" y="20" width="200" height="200" rx="52" fill="url(#dcOrange)" filter="url(#shadow)"/>
  
  <!-- 记事本页面（半透明叠加） -->
  <rect x="50" y="45" width="140" height="165" rx="12" fill="white" opacity="0.95"/>
  
  <!-- 页面折角效果 -->
  <path d="M170 45 L190 45 L190 75 L170 95 Z" fill="#FFE4D6"/>
  
  <!-- DC 图标核心元素（融入记事本） -->
  <g transform="translate(70, 65)">
    <!-- DC 的 U 形/括号图形 -->
    <path d="M50 20 
             C30 20, 15 35, 15 55 
             C15 80, 35 95, 50 95
             C65 95, 85 80, 85 55
             C85 35, 70 20, 50 20" 
          fill="none" 
          stroke="#FF6B35" 
          stroke-width="8" 
          stroke-linecap="round"
          opacity="0.9"/>
    
    <!-- 中心小圆点（DC 风格） -->
    <circle cx="50" cy="55" r="8" fill="#FF6B35"/>
  </g>
  
  <!-- 文本行（在 DC 图形下方） -->
  <rect x="75" y="125" width="90" height="4" rx="2" fill="#9CA3AF" opacity="0.6"/>
  <rect x="75" y="138" width="70" height="4" rx="2" fill="#9CA3AF" opacity="0.6"/>
  <rect x="75" y="151" width="80" height="4" rx="2" fill="#9CA3AF" opacity="0.6"/>
  
  <!-- 便签贴（点缀） -->
  <rect x="155" y="160" width="25" height="25" rx="4" fill="#FF6B35" opacity="0.2"/>
</svg>
