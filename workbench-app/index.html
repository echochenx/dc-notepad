<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC 悬浮记事本</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 标题栏 -->
    <div id="header">
      <div id="logo">
        <svg viewBox="0 0 100 100" class="logo-icon">
          <defs>
            <linearGradient id="dcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#10B981"/>
              <stop offset="100%" style="stop-color:#F97316"/>
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#dcGrad)"/>
          <path d="M50 72 L28 48 Q23 42 28 37 Q34 32 40 38 L50 52 L60 38 Q66 32 72 37 Q77 42 72 48 Z" fill="white"/>
        </svg>
        <span class="title">DC 悬浮记事本</span>
      </div>
      <button id="btn-settings" title="设置">⚙️</button>
    </div>

    <!-- 搜索栏 -->
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="搜索笔记...">
      <div id="search-actions">
        <button id="btn-voice" title="语音输入">🎤</button>
        <button id="btn-clipboard" title="读取剪贴板">📋</button>
      </div>
    </div>

    <!-- 分类标签 -->
    <div id="category-tabs">
      <button class="tab active" data-category="all">📁 全部</button>
      <button class="tab" data-category="todo">✅ 待办</button>
      <button class="tab" data-category="info">🔑 信息</button>
      <button class="tab" data-category="meeting">📋 会议</button>
      <button class="tab" data-category="idea">💡 灵感</button>
      <button class="tab" data-category="question">❓ 疑问</button>
    </div>

    <!-- 笔记列表 -->
    <div id="notes-list"></div>

    <!-- 输入区 -->
    <div id="input-area">
      <textarea id="note-input" placeholder="输入文字...
支持 Markdown"></textarea>
      <div id="input-actions">
        <button id="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div id="settings-panel" style="display:none">
    <div id="settings-header">
      <button id="btn-back">◀ 返回</button>
      <span>设置</span>
    </div>
    
    <div id="settings-content">
      <div class="settings-section">
        <h3>🤖 AI 分类（可选）</h3>
        <label class="switch">
          <input type="checkbox" id="ai-enabled">
          <span class="slider">启用 AI 智能分类</span>
        </label>
        <div id="ai-config" style="display:none;margin-top:12px;">
          <input type="text" id="ai-host" placeholder="服务地址 (如: 127.0.0.1)" value="127.0.0.1">
          <input type="number" id="ai-port" placeholder="端口 (如: 9999)" value="9999">
          <input type="password" id="ai-apikey" placeholder="API Key">
          <input type="text" id="ai-model" placeholder="模型名称" value="glm-5-external">
          <button id="btn-test-ai" style="margin-top:8px;">测试连接</button>
        </div>
      </div>

      <div class="settings-section">
        <h3>📊 数据管理</h3>
        <button id="btn-export">导出笔记 (JSON)</button>
        <button id="btn-import" style="margin-top:8px;">导入笔记</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>

      <div class="settings-section">
        <h3>ℹ️ 关于</h3>
        <p>版本: 1.1.0</p>
        <p>一个轻量的 DC 工作台记事工具</p>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
